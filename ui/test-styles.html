<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirsi Nexus Style Test</title>
    <style>
        /* Direct Tailwind classes test */
        .test-bg { background-color: #0ba5ec; }
        .test-text { color: white; }
        .test-padding { padding: 1rem; }
        .test-border { border-radius: 0.5rem; }
        .test-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Sirsi Nexus Style Test</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Card 1 -->
            <div class="bg-white rounded-lg shadow-md p-6 border border-gray-200">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Dashboard Card</h2>
                <p class="text-gray-600 mb-4">This card should have proper styling with background, borders, and shadows.</p>
                <button class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">Test Button</button>
            </div>
            
            <!-- Card 2 -->
            <div class="bg-white rounded-lg shadow-md p-6 border border-gray-200">
                <h2 class="text-xl font-semibold text-sirsi-500 mb-4">Sirsi Brand Colors</h2>
                <div class="space-y-2">
                    <div class="h-8 bg-sirsi-500 rounded text-white flex items-center justify-center text-sm">Primary</div>
                    <div class="h-8 bg-sirsi-300 rounded text-gray-800 flex items-center justify-center text-sm">Light</div>
                    <div class="h-8 bg-sirsi-700 rounded text-white flex items-center justify-center text-sm">Dark</div>
                </div>
            </div>
            
            <!-- Card 3 -->
            <div class="test-bg test-text test-padding test-border test-shadow">
                <h2 class="text-xl font-semibold mb-4">Custom CSS Test</h2>
                <p class="mb-4">This card uses custom CSS classes to verify style loading.</p>
                <div class="bg-white bg-opacity-20 rounded p-2">
                    <span class="text-sm">Nested content</span>
                </div>
            </div>
        </div>
        
        <!-- Form Test -->
        <div class="mt-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Form Elements Test</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Text Input</label>
                    <input type="text" placeholder="Enter text here" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-sirsi-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Select Dropdown</label>
                    <select class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-sirsi-500">
                        <option>Option 1</option>
                        <option>Option 2</option>
                        <option>Option 3</option>
                    </select>
                </div>
            </div>
            <div class="mt-4">
                <button class="bg-sirsi-500 hover:bg-sirsi-600 text-white px-6 py-2 rounded-md transition-colors">
                    Submit Form
                </button>
            </div>
        </div>
    </div>
</body>
</html>
